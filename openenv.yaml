name: fellow-buffalo
version: '1.0.0'
description: 'Email triage environment - train AI to classify, summarize, generate replies, prioritize, and manage email lifecycle'
author: Azam Sufiyan
tags:
  - email
  - nlp
  - classification
  - real-world
  - llm
tasks:
  - id: task1
    name: email-intake
    difficulty: easy
    description: 'Classify email into tab (Jobs/Internships/News/Sports/Events/Finance/General), color (green/orange/red), and extract deadline'
  - id: task2
    name: metadata-generation
    difficulty: medium
    description: 'Generate AI summary and tag cloud from email body and attachments'
  - id: task3
    name: lifecycle-manager
    difficulty: hard
    description: 'Manage color transitions (Green→Orange→Red) and group emails for archiving with storage monitoring'
  - id: task4
    name: reply-generation
    difficulty: medium
    description: 'Generate professional replies to incoming emails with appropriate tone and completeness'
  - id: task5
    name: priority-ranking
    difficulty: hard
    description: 'Rank 10 emails by priority/urgency to determine which should be addressed first'
server:
  port: 7860
  health_endpoint: /health
  endpoints:
    - /reset
    - /step
    - /state
    - /tasks
    - /baseline
    - /grader
    - /web